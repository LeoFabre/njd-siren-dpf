name: build-windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # DPF's Windows target is MinGW (dgl/NanoVG don't build under MSVC)
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ccache

      - name: Compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-mingw64-${{ github.sha }}
          restore-keys: ccache-mingw64-

      - name: Configure
        run: >-
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DSIREN_BUILD_UI=ON
          -DSIREN_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j 4

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: ccache stats
        run: ccache -s

      - name: Check runtime DLL deps (must be system-only)
        run: |
          objdump -p build/bin/Siren.vst3/Contents/x86_64-win/Siren.vst3 | grep "DLL Name"
          if objdump -p build/bin/Siren.vst3/Contents/x86_64-win/Siren.vst3 | grep -iE "libgcc|libstdc|winpthread"; then
            echo "::error::plugin depends on MinGW runtime DLLs"; exit 1
          fi

      # Stage the bundle FOLDERS so the extracted zip is drop-in installable
      # (Siren.vst3/Contents/x86_64-win/Siren.vst3)
      - name: Stage bundles
        run: |
          mkdir -p dist-vst3 dist-lv2
          cp -r build/bin/Siren.vst3 dist-vst3/
          cp -r build/bin/Siren.lv2 dist-lv2/

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Siren-vst3-windows-x64-${{ github.sha }}
          path: dist-vst3/
          if-no-files-found: error

      - name: Upload LV2
        uses: actions/upload-artifact@v4
        with:
          name: Siren-lv2-windows-x64-${{ github.sha }}
          path: dist-lv2/
          if-no-files-found: error
